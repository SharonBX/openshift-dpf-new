# Role worker: all workers get this MC.
# feature.node.kubernetes.io/dpu-enabled=true is written to kubelet-env only on BF3/DPU PCI (dpu-network-stamp.sh), not Ignition.
# dpu-network-stamp.sh: sanitize kubelet-env; BF3 → stamp + CUSTOM_KUBELET_LABELS (worker-dpu MCP; kubelet cannot set k8s.ovn.org/*).
# nmstate-bridge + p0-routing use ConditionPathExists=/run/dpu-worker-network (plain ExecStart, no wrapper).
# Re-embed: base64 -w0 configuration_templates/dpu-network-stamp.sh
#           base64 -w0 configuration_templates/apply-nmstate-bridge.sh
#           base64 -w0 configuration_templates/configure-pod-to-worker-routing.sh
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: worker-nmstate-bridge
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - contents:
            source: data:text/plain;charset=utf-8;base64,
          mode: 0755
          overwrite: true
          path: /usr/local/bin/dpu-network-stamp.sh
        - contents:
            source: data:text/plain;charset=utf-8;base64,
          mode: 0755
          overwrite: true
          path: /usr/local/bin/apply-nmstate-bridge.sh
        - contents:
            source: data:text/plain;charset=utf-8;base64,
          mode: 0755
          overwrite: true
          path: /usr/local/bin/configure-p0-routing.sh
    systemd:
      units:
        - contents: |
            [Unit]
            Description=Sanitize kubelet-env if needed; stamp /run/dpu-worker-network when BF3 PCI present
            After=local-fs.target
            Before=kubelet-dependencies.target
            DefaultDependencies=no

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/local/bin/dpu-network-stamp.sh
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=kubelet-dependencies.target
          enabled: true
          name: dpu-network-stamp.service
        - contents: |
            [Unit]
            Description=Apply NMState br-dpu (DPU nodes: /run/dpu-worker-network from dpu-network-stamp)
            ConditionPathExists=/run/dpu-worker-network
            After=network.target NetworkManager.service dpu-network-stamp.service
            Wants=NetworkManager.service dpu-network-stamp.service
            
            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/apply-nmstate-bridge.sh <NODES_MTU>
            RemainAfterExit=yes
            
            [Install]
            WantedBy=multi-user.target
          enabled: true
          name: nmstate-bridge.service
        - name: ovs-configuration.service
          enabled: false
        - name: openvswitch.service
          enabled: false
          mask: true
        - name: wait-for-br-ex-up.service
          enabled: false
        - name: p0-routing.service
          enabled: true
          contents: |
            [Unit]
            Description=Configure p0 OVN routing (DPU nodes: /run/dpu-worker-network)
            ConditionPathExists=/run/dpu-worker-network
            After=kubelet.service network-online.target dpu-network-stamp.service
            Wants=network-online.target
            
            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/configure-p0-routing.sh
            RemainAfterExit=yes
            StandardOutput=journal
            StandardError=journal
            Restart=on-failure
            RestartSec=10
            
            [Install]
            WantedBy=multi-user.target
