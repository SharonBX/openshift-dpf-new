# worker-dpu role: kubelet-env for CUSTOM_KUBELET_LABELS. <KUBELET_ENV_BASE64> filled by worker.sh from WORKER_NODE_LABELS.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker-dpu
  name: 99-worker-node-labels
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /etc/kubernetes/kubelet-env
          mode: 0644
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,<KUBELET_ENV_BASE64>
~ 


